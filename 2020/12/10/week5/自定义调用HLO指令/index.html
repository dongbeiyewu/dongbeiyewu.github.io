      <p>可以通过XLA的客户端API创建代表自定义调用的HLO指令。</p>
<p>例如，以下代码使用自定义调用A[i] = B[i % 128] + C[i]在CPU上进行计算 。</p>

32, &#123;<span class="number">2048</span>&#125;), <span class="string">&quot;p1&quot;</span>);</span><br><span class="line">  xla::XlaOp custom_call =</span><br><span class="line">      xla::CustomCall(&amp;b, <span class="string">&quot;do_custom_call&quot;</span>, <span class="comment">/*operands=*/</span>&#123;param0, param1&#125;,</span><br><span class="line">                      <span class="comment">/*output_shape=*/</span>ShapeUtil::CreateShape(F32, &#123;<span class="number">2048</span>&#125;));</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">do_custom_call</span><span class="params">(<span class="keyword">void</span>* out, <span class="keyword">const</span> <span class="keyword">void</span>** in)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">float</span>* out_buf = <span class="keyword">reinterpret_cast</span>&lt;<span class="keyword">float</span>*&gt;(out);</span><br><span class="line">  <span class="keyword">const</span> <span class="keyword">float</span>* in0 = <span class="keyword">reinterpret_cast</span>&lt;<span class="keyword">const</span> <span class="keyword">float</span>*&gt;(in[<span class="number">0</span>]);</span><br><span class="line">  <span class="keyword">const</span> <span class="keyword">float</span>* in1 = <span class="keyword">reinterpret_cast</span>&lt;<span class="keyword">const</span> <span class="keyword">float</span>*&gt;(in[<span class="number">1</span>]);</span><br><span class="line">  <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; <span class="number">2048</span>; ++i) &#123;</span><br><span class="line">    out_buf[i] = in0[i % <span class="number">128</span>] + in1[i];</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line">XLA_REGISTER_CUSTOM_CALL_TARGET(do_custom_cal
